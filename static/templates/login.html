<div class="card auth-card">
    <h2>로그인</h2>
    <form onsubmit="pages.handleLogin(event)">
        <label for="email">이메일</label>
        <input type="email" id="email" placeholder="이메일" required>
        
        <label for="password">비밀번호</label>
        <input type="password" id="password" placeholder="비밀번호" required>
        
        <div id="login-error" class="error-message" style="display: none; color: var(--danger-color); font-size: 0.85rem; margin-top: -0.5rem; margin-bottom: 0.5rem; font-weight: 500;">
            아이디 또는 비밀번호를 확인해주세요.
        </div>
        
        <button type="submit" style="margin-top: 0.5rem;">로그인</button>
    </form>
    <p style="text-align: center; margin-top: 1rem;">계정이 없으신가요? <a href="/signup" onclick="route(event)">회원가입</a></p>
</div>
