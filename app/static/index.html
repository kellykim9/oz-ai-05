<!DOCTYPE html>
<html lang='ko'>
<head>
    <meta charset='UTF-8'>
    <title>AI 폐렴 예측 시스템</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; margin-top: 50px; background-color: #f4f6f9; }
        .card { background: white; padding: 30px; border-radius: 10px; display: inline-block; box-shadow: 0px 4px 10px rgba(0,0,0,0.1); }
        button { background-color: #007bff; color: white; border: none; padding: 10px 20px; font-size: 16px; border-radius: 5px; cursor: pointer; }
        button:hover { background-color: #0056b3; }
        #result { margin-top: 20px; font-weight: bold; }
    </style>
</head>
<body>
    <div class='card'>
        <h2>🏥 AI 폐렴 예측 프로그램</h2>
        <p>버튼을 눌러 엑스레이 사진을 분석해 보세요!</p>
        <input type='text' id='recordId' value='record_123' placeholder='진료 기록 번호 입력'><br><br>
        <button onclick='predictPneumonia()'>폐렴 예측하기</button>
        <div id='result'></div>
    </div>
    <script src='/static/script.js'></script>
</body>
</html>
